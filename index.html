<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sistema Comercial</title>

<link rel="stylesheet" href="css/styles.css">

</head>

<body>

<h1>🛒 Sistema Comercial</h1>

<div class="top-bar">
<button onclick="listarProductos()">🔄 Cargar Productos</button>

<input type="text" id="buscar" placeholder="🔍 Buscar producto">
<button onclick="buscarProductos()">Buscar</button>

<select id="ordenar" onchange="ordenarProductos()">
<option value="">Ordenar</option>
<option value="asc">⬆️ Menor precio</option>
<option value="desc">⬇️ Mayor precio</option>
</select>

<a href="ventas.html"><button>📊 Ventas</button></a>
</div>

<hr>

<h2>📦 Inventario</h2>
<div class="inventario-box">
<input type="text" id="nombre" placeholder="Nombre">
<input type="number" id="precio" placeholder="Precio">
<input type="number" id="stock" placeholder="Stock">
<button onclick="agregarInventario()">➕ Agregar / Actualizar</button>
</div>

<hr>

<h2>📦 Productos</h2>
<div id="productos"></div>

<hr>

<h2>🛒 Carrito</h2>
<ul id="carrito"></ul>
<p id="total"></p>

<hr>

<h2>💰 Caja</h2>
<p>Total: <strong id="totalCaja"></strong></p>
<input type="number" id="pagoCliente" placeholder="Dinero recibido">
<button onclick="pagar()">💵 Pagar</button>

<p id="cambio"></p>

<hr>

<h2>🧾 Factura</h2>
<div id="factura"></div>

<script src="js/script.js"></script>

</body>
</html>
