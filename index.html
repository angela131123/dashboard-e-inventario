<!-- index.html -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Comercial</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<script>
let sesion = JSON.parse(localStorage.getItem("sesionActiva"));

if(!sesion){
window.location.href="login.html";
}
</script>

<header class="top-bar">

<h1>🛒 Sistema Comercial</h1>

<div class="perfil-box">
<span id="usuarioActivo"></span>
<span id="rolActivo"></span>

<button onclick="cerrarSesion()">🚪 Salir</button>
</div>

</header>

<div class="top-bar">

<button onclick="listarProductos()">🔄 Productos</button>

<input type="text" id="buscar" placeholder="Buscar">

<button onclick="buscarProductos()">Buscar</button>

<select id="ordenar" onchange="ordenarProductos()">
<option value="">Ordenar</option>
<option value="asc">Menor precio</option>
<option value="desc">Mayor precio</option>
</select>

<a href="inventario.html">
<button id="btnInventario">📦 Inventario</button>
</a>

<a href="ventas.html">
<button id="btnVentas">📊 Ventas</button>
</a>

</div>

<hr>

<h2>📦 Productos</h2>
<div id="productos"></div>

<hr>

<h2>🛒 Carrito</h2>
<ul id="carrito"></ul>
<p id="total"></p>

<hr>

<div id="moduloCaja">
<h2>💰 Caja</h2>

<p>Total: <strong id="totalCaja"></strong></p>

<input type="number" id="pagoCliente" placeholder="Dinero recibido">

<button onclick="pagar()">Pagar</button>

<p id="cambio"></p>
</div>

<hr>

<h2>🧾 Factura</h2>
<div id="factura"></div>

<script src="js/script.js"></script>
</body>
</html>
